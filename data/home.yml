  title: "Tech Radar"
  lede: "A living map of tools, protocols, and infrastructure we use."
sections:
  radar:
    title: "The choice is ours."
    description: "This radar maps technologies helping to shape a more open, sovereign, and resilient digital future for Lugano."
  rings:
    title: "Signals Of Adoption"
    description: "The rings show where each technology stands today: trusted, advancing, emerging, or best approached with restraint."
  quadrants:
    title: "Key Domains"
    description: "Each quadrant represents a strategic area of the stack, from foundational infrastructure to data, security, and software tools."
